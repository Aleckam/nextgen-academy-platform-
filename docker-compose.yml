services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nextgen
      POSTGRES_PASSWORD: nextgen
      POSTGRES_DB: nextgen_academy
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://nextgen:nextgen@db:5432/nextgen_academy
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
